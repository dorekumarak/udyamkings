<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Fee Payment - UdyamKings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Complete Your Payment</h4>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="fas fa-credit-card fa-4x text-primary mb-3"></i>
                            <h3>Application Fee Payment</h3>
                            <p class="lead">Amount: ₹500</p>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            Please complete the payment to finalize your application submission.
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" onclick="alert('Payment gateway integration coming soon! Your application has been submitted successfully.')">
                                <i class="fas fa-lock me-2"></i>Pay Now - ₹500
                            </button>
                            <a href="/apply" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back to Application
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
